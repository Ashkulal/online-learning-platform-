<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduction to Java - Online Learning Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <h1>Online Learning Platform</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/courses">All Courses</a>
            <a href="/my-courses" id="my-courses-link">My Courses</a>
        </nav>
    </header>

    <main>
        <section class="course-detail">
            <h2>Introduction to Java</h2>
            <p>Learn the basics of Java programming</p>
            <p>Duration: <span>10</span> hours</p>
            <p>Instructor: <span>John Doe</span></p>
            <button id="enroll-btn" class="btn enroll-btn" data-course-id="1">Enroll Now</button>

            <!-- Lessons section - only show if enrolled -->
            <div id="lessons-section" class="lessons-section" style="display: none;">
                <h3>Course Lessons</h3>
                <div class="progress-bar">
                    <div id="course-progress-fill" class="progress-fill"></div>
                    <span id="course-progress-text" class="progress-text">0% Complete</span>
                </div>
                <div id="lessons-list" class="lessons-list">
                    <!-- Lessons will be populated by JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Online Learning Platform</p>
    </footer>

    <script src="/js/script.js"></script>
</body>
</html>
