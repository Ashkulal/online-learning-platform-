<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Form - Admin</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .admin-form-container {
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            box-shadow: var(--shadow-md);
        }
        .form-group {
            margin-bottom: 1.5rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
        }
        .form-group input[type="text"], 
        .form-group input[type="number"], 
        .form-group textarea {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
        }
        .form-group textarea {
            min-height: 120px;
            resize: vertical;
        }
        .form-group input[type="checkbox"] {
            margin-right: 0.5rem;
            transform: scale(1.2);
        }
        .form-actions {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
        }
        .btn-outline {
            background: transparent;
            border: 2px solid var(--border-color);
            color: var(--text-dark);
        }
    </style>
</head>
<body>
    <header>
        <h1>Admin Panel</h1>
        <nav>
            <a href="/admin/dashboard">Dashboard</a>
            <a href="/logout">Logout</a>
        </nav>
    </header>

    <main>
        <div class="admin-form-container">
            <h2 th:text="${course.id == null ? 'Add New Course' : 'Edit Course'}">Course Form</h2>
            
            <form th:action="@{/admin/course/save}" th:object="${course}" method="post">
                <input type="hidden" th:field="*{id}" />
                
                <div class="form-group">
                    <label>Title</label>
                    <input type="text" th:field="*{title}" required>
                </div>
                
                <div class="form-group">
                    <label>Description</label>
                    <textarea th:field="*{description}" required></textarea>
                </div>
                
                <div class="form-group">
                    <label>Instructor</label>
                    <input type="text" th:field="*{instructor}" required>
                </div>
                
                <div class="form-group">
                    <label>Duration (hours)</label>
                    <input type="number" th:field="*{duration}" min="1" required>
                </div>
                
                <div class="form-group">
                    <label>
                        <input type="checkbox" th:field="*{featured}"> Featured Course (appears on Homepage)
                    </label>
                </div>
                
                <div class="form-actions">
                    <button type="submit" class="btn">Save Course</button>
                    <a href="/admin/dashboard" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </main>
</body>
</html>
