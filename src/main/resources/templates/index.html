<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Online Learning Platform</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div id="toast-container" class="toast-container"></div>
    <header>
        <h1>Online Learning Platform</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/courses">All Courses</a>
            <a href="/my-courses" id="my-courses-link" th:if="${session.userId != null}">My Courses</a>
            <a href="/admin/dashboard" th:if="${session.role == 'ADMIN'}">Admin Panel</a>
            <a href="/login" th:if="${session.userId == null}">Login/Signup</a>
            <a href="/logout" th:if="${session.userId != null}">Logout (<span th:text="${session.username}"></span>)</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>Welcome back, <span th:text="${session.username}"></span>!</h2>
            <p>Discover new skills and advance your career with our curated courses.</p>
        </section>

        <section class="featured-courses">
            <h2>Featured Courses</h2>
            <div class="course-grid" th:each="course : ${featuredCourses}">
                <div class="course-card">
                    <h3 th:text="${course.title}"></h3>
                    <p class="course-desc" th:text="${course.description}"></p>
                    <div class="course-meta">
                        <span><i class="duration-icon"></i> <span th:text="${course.duration}"></span> hours</span>
                        <span><i class="instructor-icon"></i> <span th:text="${course.instructor}"></span></span>
                    </div>
                    <a th:href="@{/course/{id}(id=${course.id})}" class="btn">View Details</a>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2023 Online Learning Platform</p>
    </footer>

    <script src="/js/script.js"></script>
</body>
</html>
