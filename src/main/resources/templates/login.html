<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Online Learning Platform</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .auth-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 80vh;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            padding: 2.5rem;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            text-align: center;
        }
        .auth-card h2 {
            margin-bottom: 1.5rem;
            color: var(--text-dark);
        }
        .auth-form input {
            width: 100%;
            padding: 0.85rem;
            margin-bottom: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            background: white;
            box-sizing: border-box;
        }
        .auth-form input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .auth-form button {
            width: 100%;
            padding: 0.85rem;
            border: none;
            border-radius: 8px;
            background: var(--primary);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: background 0.3s ease;
        }
        .auth-form button:hover {
            background: var(--primary-hover);
        }
        .auth-links {
            margin-top: 1.5rem;
            font-size: 0.9rem;
        }
        .auth-links a {
            color: var(--primary);
            text-decoration: none;
        }
        .error-msg {
            color: #dc2626;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            background: #fee2e2;
            padding: 0.5rem;
            border-radius: 6px;
        }
        .success-msg {
            color: #16a34a;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            background: #dcfce7;
            padding: 0.5rem;
            border-radius: 6px;
        }
        .admin-login-section {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }
        .admin-login-section h3 {
            margin-bottom: 1rem;
            color: var(--text-dark);
            font-size: 1.1rem;
        }
        .admin-login-btn {
            background: #475569 !important;
        }
        .admin-login-btn:hover {
            background: #334155 !important;
        }
    </style>
</head>
<body>
    <header>
        <h1>Online Learning Platform</h1>
        <nav>
            <a href="/">Home</a>
            <a href="/courses">All Courses</a>
        </nav>
    </header>

    <main class="auth-container">
        <div class="auth-card">
            <h2>Welcome Back</h2>
            
            <div th:if="${error}" class="error-msg" th:text="${error}"></div>
            <div th:if="${param.success != null && param.success[0] == 'registered'}" class="success-msg">Registration successful! Please login.</div>
            <div th:if="${param.success != null && param.success[0] == 'loggedout'}" class="success-msg">You have been logged out.</div>

            <form class="auth-form" action="/login" method="post">
                <input type="text" name="username" placeholder="Username" required>
                <input type="password" name="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>
            
            <div class="auth-links">
                Don't have an account? <a href="/signup">Sign up</a>
            </div>
            
            <div class="admin-login-section">
                <h3>Admin Login</h3>
                <form class="auth-form" action="/login" method="post">
                    <input type="hidden" name="username" value="admin">
                    <input type="password" name="password" placeholder="Admin Password" required>
                    <button type="submit" class="admin-login-btn">Login as Administrator</button>
                </form>
            </div>
        </div>
    </main>

    <footer>
        <p>&copy; 2023 Online Learning Platform</p>
    </footer>
</body>
</html>
